services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - wikicollab-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/data/wikicollab.db
      # Update CORS_ORIGINS to your actual frontend domain(s), comma-separated.
      # Without this, WebSocket connections will be silently rejected with 403.
      - CORS_ORIGINS=https://your-domain.com
    restart: unless-stopped

volumes:
  wikicollab-data:
