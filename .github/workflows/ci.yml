name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter shared build
      - run: pnpm test
      - name: Coverage
        if: github.event_name == 'pull_request'
        run: pnpm --filter server exec vitest run --coverage
      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUM: ${{ github.event.number }}
        run: |
          SUMMARY="packages/server/coverage/coverage-summary.json"
          if [ -f "$SUMMARY" ]; then
            L=$(jq -r '.total.lines.pct' "$SUMMARY")
            B=$(jq -r '.total.branches.pct' "$SUMMARY")
            F=$(jq -r '.total.functions.pct' "$SUMMARY")
            gh pr comment "$PR_NUM" --body "$(printf '## Coverage Report\n- **Lines:** %.1f%%\n- **Branches:** %.1f%%\n- **Functions:** %.1f%%' "$L" "$B" "$F")"
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit

  docker:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - run: docker build -t ghcr.io/burnoutberni/wikicollab:sha-${{ github.sha }} -t ghcr.io/burnoutberni/wikicollab:latest .
      - run: docker push ghcr.io/burnoutberni/wikicollab:sha-${{ github.sha }}
      - run: docker push ghcr.io/burnoutberni/wikicollab:latest
