name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter shared build
      - run: pnpm test
      - name: Coverage
        if: github.event_name == 'pull_request'
        run: pnpm --filter server exec vitest run --coverage
      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUM: ${{ github.event.number }}
        run: |
          SUMMARY="packages/server/coverage/coverage-summary.json"
          if [ -f "$SUMMARY" ]; then
            L=$(jq -r '.total.lines.pct' "$SUMMARY")
            B=$(jq -r '.total.branches.pct' "$SUMMARY")
            F=$(jq -r '.total.functions.pct' "$SUMMARY")
            gh pr comment "$PR_NUM" --body "$(printf '## Coverage Report\n- **Lines:** %.1f%%\n- **Branches:** %.1f%%\n- **Functions:** %.1f%%' "$L" "$B" "$F")"
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run audit

  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [lint, test, build, audit]
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter shared build && pnpm --filter server build && pnpm --filter client build
      - name: Fetch tags
        run: git fetch --tags --force
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm exec semantic-release
      - name: Fetch tags (after release)
        run: git fetch --tags --force
      - name: Resolve version
        id: version
        run: echo "version=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and push Docker images
        run: |
          docker buildx build --push \
            --build-arg VERSION=${{ steps.version.outputs.version }} \
            -t ghcr.io/burnoutberni/wikicollab:sha-${{ github.sha }} \
            -t ghcr.io/burnoutberni/wikicollab:${{ steps.version.outputs.version }} \
            -t ghcr.io/burnoutberni/wikicollab:latest \
            .
      - name: Update release with Docker image link
        run: |
          NOTES=$(gh release view "${{ steps.version.outputs.version }}" --json body --jq '.body')
          gh release edit "${{ steps.version.outputs.version }}" \
            --notes "${NOTES}

            ---

            **Docker image**

            \`\`\`
            docker pull ghcr.io/burnoutberni/wikicollab:${{ steps.version.outputs.version }}
            \`\`\`"
        env:
          GH_TOKEN: ${{ github.token }}
