name: Test and deploy to Toolforge

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: toolforge-production-deployment
  cancel-in-progress: false

jobs:
  test:
    name: Test production build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build application
        run: pnpm build

  deploy:
    name: Deploy to Toolforge
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    environment:
      name: production
      url: https://wikicollab.toolforge.org

    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.TOOLFORGE_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.TOOLFORGE_KNOWN_HOSTS }}
        run: |
          set -Eeuo pipefail

          install -d -m 700 "$HOME/.ssh"

          printf '%s\n' "$SSH_PRIVATE_KEY" \
            > "$HOME/.ssh/toolforge_wikicollab_ci"

          chmod 600 "$HOME/.ssh/toolforge_wikicollab_ci"

          printf '%s\n' "$SSH_KNOWN_HOSTS" \
            > "$HOME/.ssh/known_hosts"

          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Deploy
        env:
          TOOLFORGE_USERNAME: ${{ secrets.TOOLFORGE_USERNAME }}
        run: |
          set -Eeuo pipefail

          ssh \
            -i "$HOME/.ssh/toolforge_wikicollab_ci" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o RequestTTY=force \
            "${TOOLFORGE_USERNAME}@login.toolforge.org" \
            "become wikicollab ./bin/deploy-wikicollab.sh"